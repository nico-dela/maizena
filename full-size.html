<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>$GODOT_PROJECT_NAME</title>
    <style>
      html,
      body,
      #canvas {
        margin: 0;
        padding: 0;
        border: 0;
      }

      body {
        color: #2d2138;
        background-color: #c44e83;
        overflow: hidden;
        touch-action: none;
      }

      #canvas {
        display: block;
        background-color: #c44e83;
      }

      #canvas:focus {
        outline: none;
      }

      #status {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 1.5rem;
        box-sizing: border-box;
        background-color: #c44e83;
        visibility: visible;
      }

      #status-splash {
        display: none;
      }

      #status-inner {
        width: min(420px, 92vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.85rem;
        text-align: center;
      }

      #status-title {
        margin: 0;
        font-family: system-ui, sans-serif;
        font-size: clamp(1.35rem, 5vw, 2rem);
        font-weight: 800;
        letter-spacing: 0.04em;
        line-height: 1.15;
        color: #2d2138;
      }

      #status-label {
        margin: 0;
        font-family: system-ui, sans-serif;
        font-size: clamp(0.95rem, 3.2vw, 1.05rem);
        color: rgba(45, 33, 56, 0.88);
      }

      #status-progress {
        width: 100%;
        height: 1.1rem;
        margin: 0;
        accent-color: #3b82f6;
      }

      #status-notice {
        display: none;
        max-width: 32rem;
        background-color: #5b3943;
        border-radius: 0.5rem;
        border: 1px solid #9b3943;
        color: #e0e0e0;
        font-family: system-ui, sans-serif;
        line-height: 1.35;
        padding: 1rem 1.25rem;
        text-align: center;
      }
    </style>
    $GODOT_HEAD_INCLUDE
  </head>
  <body>
    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>

    <noscript> Your browser does not support JavaScript. </noscript>

    <div id="status">
      <img id="status-splash" src="$GODOT_SPLASH" alt="" hidden />
      <div id="status-inner">
        <h1 id="status-title">ARCHIPIÉLAGO MAIZENA</h1>
        <p id="status-label">Cargando…</p>
        <progress id="status-progress" value="0" max="100"></progress>
      </div>
      <div id="status-notice"></div>
    </div>

    <script src="$GODOT_URL"></script>
    <script>
      const GODOT_CONFIG = $GODOT_CONFIG;
      const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
      const engine = new Engine(GODOT_CONFIG);

      (function () {
        const statusOverlay = document.getElementById("status");
        const statusInner = document.getElementById("status-inner");
        const statusProgress = document.getElementById("status-progress");
        const statusNotice = document.getElementById("status-notice");
        const statusLabel = document.getElementById("status-label");

        let initializing = true;
        let statusMode = "progress";

        function setStatusMode(mode) {
          if (statusMode === mode || !initializing) {
            return;
          }
          if (mode === "hidden") {
            statusOverlay.remove();
            initializing = false;
            return;
          }
          statusOverlay.style.visibility = "visible";
          if (statusInner) {
            statusInner.style.display = mode === "notice" ? "none" : "flex";
          }
          statusNotice.style.display = mode === "notice" ? "block" : "none";
          statusMode = mode;
        }

        function setStatusNotice(text) {
          while (statusNotice.lastChild) {
            statusNotice.removeChild(statusNotice.lastChild);
          }
          const lines = text.split("\n");
          lines.forEach((line) => {
            statusNotice.appendChild(document.createTextNode(line));
            statusNotice.appendChild(document.createElement("br"));
          });
        }

        function displayFailureNotice(err) {
          console.error(err);
          if (err instanceof Error) {
            setStatusNotice(err.message);
          } else if (typeof err === "string") {
            setStatusNotice(err);
          } else {
            setStatusNotice("An unknown error occured");
          }
          setStatusMode("notice");
          initializing = false;
        }

        function startGame() {
          setStatusMode("progress");
          engine
            .startGame({
              onProgress: function (current, total) {
                if (current > 0 && total > 0) {
                  statusProgress.value = current;
                  statusProgress.max = total;
                  if (statusLabel) {
                    const pct = Math.round((current / total) * 100);
                    statusLabel.textContent = "Descargando… " + pct + "%";
                  }
                } else {
                  statusProgress.removeAttribute("value");
                  statusProgress.removeAttribute("max");
                  if (statusLabel) {
                    statusLabel.textContent = "Preparando…";
                  }
                }
              },
            })
            .then(() => {
              setStatusMode("hidden");
            }, displayFailureNotice);
        }

        const missing = Engine.getMissingFeatures({
          threads: GODOT_THREADS_ENABLED,
        });

        if (missing.length !== 0) {
          if (
            GODOT_CONFIG["serviceWorker"] &&
            GODOT_CONFIG["ensureCrossOriginIsolationHeaders"] &&
            "serviceWorker" in navigator
          ) {
            Promise.race([
              navigator.serviceWorker
                .getRegistration()
                .then((registration) => {
                  if (registration != null) {
                    return registration.update().then(() => registration);
                  }
                  return engine.installServiceWorker();
                }),
              new Promise((resolve) => {
                setTimeout(() => resolve(), 2000);
              }),
            ])
              .then(() => {
                window.location.reload();
              })
              .catch((err) => {
                console.error("Error while registering service worker:", err);
                const missingMsg =
                  "Error\nThe following features required to run Godot projects on the Web are missing:\n";
                displayFailureNotice(missingMsg + missing.join("\n"));
              });
          } else {
            const missingMsg =
              "Error\nThe following features required to run Godot projects on the Web are missing:\n";
            displayFailureNotice(missingMsg + missing.join("\n"));
          }
        } else if (GODOT_CONFIG["serviceWorker"] && "serviceWorker" in navigator) {
          engine
            .installServiceWorker()
            .then(startGame)
            .catch((err) => {
              console.warn("Service worker optional install failed:", err);
              startGame();
            });
        } else {
          startGame();
        }
      })();
    </script>
  </body>
</html>
