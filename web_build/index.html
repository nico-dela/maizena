<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Archipiélago Maizena</title>
    <style>
      html,
      body,
      #canvas {
        margin: 0;
        padding: 0;
        border: 0;
      }

      body {
        background-color: #c44e83;
        overflow: hidden;
        touch-action: none;
      }

      #canvas {
        display: block;
        background-color: #c44e83;
      }

      #canvas:focus {
        outline: none;
      }

      #status {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem 1.75rem;
        box-sizing: border-box;
        background-color: #c44e83;
        color: #2d2138;
        font-family: system-ui, sans-serif;
      }

      #status-splash {
        display: none;
      }

      .loader-shell {
        width: min(420px, 92vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.125rem;
        text-align: center;
      }

      .map-frame {
        padding: 10px;
        border: 3px solid rgba(45, 33, 56, 0.9);
        border-radius: 8px;
        background: rgba(31, 23, 46, 0.55);
        line-height: 0;
      }

      .map-frame img {
        display: block;
        width: min(240px, 62vw);
        height: min(240px, 62vw);
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #status-title {
        margin: 0;
        font-size: clamp(1.45rem, 5vw, 2.05rem);
        font-weight: 800;
        letter-spacing: 0.03em;
        line-height: 1.15;
      }

      .progress-track {
        width: 100%;
        height: 18px;
        border-radius: 3px;
        background: rgba(45, 33, 56, 0.35);
        overflow: hidden;
      }

      #progress-fill {
        width: 0%;
        height: 100%;
        border-radius: 3px;
        background: #3b82f6;
        transition: width 0.15s ease-out;
      }

      #status-label,
      #status-tip,
      .loader-footer p {
        margin: 0;
      }

      #status-label {
        font-size: 1rem;
        opacity: 0.88;
      }

      #status-tip {
        font-size: 0.95rem;
        opacity: 0.88;
        min-height: 1.25em;
      }

      .loader-footer {
        margin-top: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.875rem;
        opacity: 0.72;
      }

      #status-notice {
        display: none;
        max-width: 32rem;
        background-color: #5b3943;
        border-radius: 0.5rem;
        border: 1px solid #9b3943;
        color: #e0e0e0;
        line-height: 1.35;
        padding: 1rem 1.25rem;
      }
    </style>
    <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
<link rel="manifest" href="index.manifest.json">
  </head>
  <body>
    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>
    <noscript> Your browser does not support JavaScript. </noscript>

    <div id="status">
      <img id="status-splash" src="index.png" alt="" hidden />
      <div class="loader-shell" id="status-inner">
        <div class="map-frame">
          <img src="world_map_preview.png" alt="Mapa del archipiélago" />
        </div>
        <h1 id="status-title">ARCHIPIÉLAGO MAIZENA</h1>
        <div class="progress-track"><div id="progress-fill"></div></div>
        <p id="status-label">Cargando…</p>
        <p id="status-tip"></p>
        <div class="loader-footer">
          <p>Córdoba, Argentina</p>
          <p>© 2026 Kumo Estudio</p>
        </div>
      </div>
      <div id="status-notice"></div>
    </div>

    <script src="index.js"></script>
    <script>
      const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":28694388,"index.wasm":37024354},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
      const GODOT_THREADS_ENABLED = true;
      const LOADER_TIPS = [
        "Es que nadie me enseño a vivir",
        "Todo lo que necesito es pequeño",
        "El viento sobre mi cara, mientras voy para mi casa",
        "Toda la gente se quiere ir a dormir",
        "Podemos hacer sapitos por ahi",
      ];
      const engine = new Engine(GODOT_CONFIG);

      (function () {
        const statusOverlay = document.getElementById("status");
        const statusInner = document.getElementById("status-inner");
        const progressFill = document.getElementById("progress-fill");
        const statusNotice = document.getElementById("status-notice");
        const statusLabel = document.getElementById("status-label");
        const statusTip = document.getElementById("status-tip");

        let initializing = true;
        let statusMode = "progress";
        statusTip.textContent = LOADER_TIPS[Math.floor(Math.random() * LOADER_TIPS.length)];

        function setProgress(ratio) {
          const pct = Math.max(0, Math.min(100, Math.round(ratio * 100)));
          progressFill.style.width = pct + "%";
        }

        function setStatusMode(mode) {
          if (statusMode === mode || !initializing) {
            return;
          }
          if (mode === "hidden") {
            statusOverlay.remove();
            initializing = false;
            return;
          }
          if (statusInner) {
            statusInner.style.display = mode === "notice" ? "none" : "flex";
          }
          statusNotice.style.display = mode === "notice" ? "block" : "none";
          statusMode = mode;
        }

        function setStatusNotice(text) {
          while (statusNotice.lastChild) {
            statusNotice.removeChild(statusNotice.lastChild);
          }
          text.split("\n").forEach((line) => {
            statusNotice.appendChild(document.createTextNode(line));
            statusNotice.appendChild(document.createElement("br"));
          });
        }

        function displayFailureNotice(err) {
          console.error(err);
          if (err instanceof Error) {
            setStatusNotice(err.message);
          } else if (typeof err === "string") {
            setStatusNotice(err);
          } else {
            setStatusNotice("An unknown error occured");
          }
          setStatusMode("notice");
          initializing = false;
        }

        function startGame() {
          setStatusMode("progress");
          statusLabel.textContent = "Cargando…";
          engine
            .startGame({
              onProgress: function (current, total) {
                if (current > 0 && total > 0) {
                  const ratio = current / total;
                  setProgress(ratio * 0.92);
                  statusLabel.textContent = "Descargando… " + Math.round(ratio * 100) + "%";
                } else {
                  setProgress(0.05);
                  statusLabel.textContent = "Preparando…";
                }
              },
            })
            .then(() => {
              setProgress(0.92);
              statusLabel.textContent = "Cargando…";
              setStatusMode("hidden");
            }, displayFailureNotice);
        }

        setProgress(0.03);

        const missing = Engine.getMissingFeatures({
          threads: GODOT_THREADS_ENABLED,
        });

        if (missing.length !== 0) {
          if (
            GODOT_CONFIG["serviceWorker"] &&
            GODOT_CONFIG["ensureCrossOriginIsolationHeaders"] &&
            "serviceWorker" in navigator
          ) {
            Promise.race([
              navigator.serviceWorker
                .getRegistration()
                .then((registration) => {
                  if (registration != null) {
                    return registration.update().then(() => registration);
                  }
                  return engine.installServiceWorker();
                }),
              new Promise((resolve) => setTimeout(resolve, 2000)),
            ])
              .then(() => window.location.reload())
              .catch((err) => {
                console.error("Error while registering service worker:", err);
                displayFailureNotice(
                  "Error\nThe following features required to run Godot projects on the Web are missing:\n" +
                    missing.join("\n")
                );
              });
          } else {
            displayFailureNotice(
              "Error\nThe following features required to run Godot projects on the Web are missing:\n" +
                missing.join("\n")
            );
          }
        } else if (GODOT_CONFIG["serviceWorker"] && "serviceWorker" in navigator) {
          engine
            .installServiceWorker()
            .then(startGame)
            .catch((err) => {
              console.warn("Service worker optional install failed:", err);
              startGame();
            });
        } else {
          startGame();
        }
      })();
    </script>
  </body>
</html>
