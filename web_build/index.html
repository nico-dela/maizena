<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, viewport-fit=cover"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Archipiélago Maizena</title>
    <style>
      :root {
        --maizena-loader-bg: #c44e83;
        --maizena-game-bleed: #0a0f24;
      }

      html,
      body,
      #canvas {
        margin: 0;
        padding: 0;
        border: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--maizena-game-bleed);
      }

      body {
        color: #2d2138;
        touch-action: none;
      }

      #canvas {
        display: block;
        outline: none;
        background-color: var(--maizena-game-bleed);
      }

      #status {
        position: fixed;
        inset: 0;
        background-color: var(--maizena-loader-bg);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        visibility: visible;
        z-index: 1;
        padding:
          env(safe-area-inset-top, 0px)
          env(safe-area-inset-right, 0px)
          env(safe-area-inset-bottom, 0px)
          env(safe-area-inset-left, 0px);
        box-sizing: border-box;
      }

      #status-splash {
        max-height: min(36vh, 220px);
        max-width: min(48vw, 220px);
        margin: 0 auto 1.25rem;
        image-rendering: pixelated;
      }

      #status-label {
        display: none;
      }

      #status-progress {
        display: block;
        width: min(420px, 72vw);
        margin: 0 auto;
        accent-color: #3b82f6;
      }

      #status-notice {
        display: none;
        background-color: #5b3943;
        border-radius: 0.5rem;
        border: 1px solid #9b3943;
        color: #e0e0e0;
        font-family: "Noto Sans", "Droid Sans", Arial, sans-serif;
        line-height: 1.3;
        margin: 1rem 2rem 0;
        overflow: hidden;
        padding: 1rem;
        text-align: center;
        z-index: 2;
      }
    </style>
    <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
<link rel="manifest" href="index.manifest.json">
  </head>
  <body>
    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>

    <noscript> Your browser does not support JavaScript. </noscript>

    <div id="status">
      <img id="status-splash" src="index.png" alt="" />
      <progress id="status-progress"></progress>
      <p id="status-label">Cargando…</p>
      <div id="status-notice"></div>
    </div>

    <script src="index.js"></script>
    <script>
      const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":28736664,"index.wasm":38814086},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
      const GODOT_THREADS_ENABLED = true;
      const engine = new Engine(GODOT_CONFIG);

      (function () {
        const statusOverlay = document.getElementById("status");
        const statusProgress = document.getElementById("status-progress");
        const statusNotice = document.getElementById("status-notice");
        const statusLabel = document.getElementById("status-label");

        let initializing = true;
        let statusMode = "progress";

        statusOverlay.style.visibility = "visible";
        statusProgress.style.display = "block";

        window.maizenaHideLoader = function () {
          if (!initializing) {
            return;
          }
          statusOverlay.remove();
          initializing = false;
          statusMode = "hidden";
          document.documentElement.style.backgroundColor = "var(--maizena-game-bleed)";
          document.body.style.backgroundColor = "var(--maizena-game-bleed)";
          const canvas = document.getElementById("canvas");
          if (canvas) {
            canvas.style.backgroundColor = "var(--maizena-game-bleed)";
          }
        };

        function notifyGodotResize() {
          window.dispatchEvent(new Event("resize"));
        }

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", notifyGodotResize);
          window.visualViewport.addEventListener("scroll", notifyGodotResize);
        }
        window.addEventListener("orientationchange", function () {
          setTimeout(notifyGodotResize, 100);
        });

        function setStatusMode(mode) {
          if (statusMode === mode || !initializing) {
            return;
          }
          if (mode === "hidden") {
            window.maizenaHideLoader();
            return;
          }
          statusOverlay.style.visibility = "visible";
          statusProgress.style.display = mode === "progress" ? "block" : "none";
          statusNotice.style.display = mode === "notice" ? "block" : "none";
          if (statusLabel) {
            statusLabel.style.display = mode === "notice" ? "none" : "block";
          }
          statusMode = mode;
        }

        function setStatusNotice(text) {
          while (statusNotice.lastChild) {
            statusNotice.removeChild(statusNotice.lastChild);
          }
          const lines = text.split("\n");
          lines.forEach((line) => {
            statusNotice.appendChild(document.createTextNode(line));
            statusNotice.appendChild(document.createElement("br"));
          });
        }

        function displayFailureNotice(err) {
          console.error(err);
          if (err instanceof Error) {
            setStatusNotice(err.message);
          } else if (typeof err === "string") {
            setStatusNotice(err);
          } else {
            setStatusNotice("An unknown error occured");
          }
          setStatusMode("notice");
          initializing = false;
        }

        function startGame() {
          setStatusMode("progress");
          engine
            .startGame({
              onProgress: function (current, total) {
                if (current > 0 && total > 0) {
                  statusProgress.value = current;
                  statusProgress.max = total;
                } else {
                  statusProgress.removeAttribute("value");
                  statusProgress.removeAttribute("max");
                }
              },
            })
            .then(() => {
              setStatusMode("hidden");
              notifyGodotResize();
            }, displayFailureNotice);
        }

        const missing = Engine.getMissingFeatures({
          threads: GODOT_THREADS_ENABLED,
        });

        if (missing.length !== 0) {
          if (
            GODOT_CONFIG["serviceWorker"] &&
            GODOT_CONFIG["ensureCrossOriginIsolationHeaders"] &&
            "serviceWorker" in navigator
          ) {
            Promise.race([
              navigator.serviceWorker
                .getRegistration()
                .then((registration) => {
                  if (registration != null) {
                    return registration.update().then(() => registration);
                  }
                  return engine.installServiceWorker();
                }),
              new Promise((resolve) => {
                setTimeout(() => resolve(), 2000);
              }),
            ])
              .then(() => {
                window.location.reload();
              })
              .catch((err) => {
                console.error("Error while registering service worker:", err);
                const missingMsg =
                  "Error\nThe following features required to run Godot projects on the Web are missing:\n";
                displayFailureNotice(missingMsg + missing.join("\n"));
              });
          } else {
            const missingMsg =
              "Error\nThe following features required to run Godot projects on the Web are missing:\n";
            displayFailureNotice(missingMsg + missing.join("\n"));
          }
        } else if (GODOT_CONFIG["serviceWorker"] && "serviceWorker" in navigator) {
          engine
            .installServiceWorker()
            .then(startGame)
            .catch((err) => {
              console.warn("Service worker optional install failed:", err);
              startGame();
            });
        } else {
          startGame();
        }
      })();
    </script>
  </body>
</html>
